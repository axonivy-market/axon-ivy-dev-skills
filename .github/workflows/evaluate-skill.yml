name: Evaluate skill

on:
  workflow_dispatch:
    inputs:
      skill:
        description: "Skill path, e.g. configuration/skills/custom-fields-l10n"
        required: true
        type: string
      model:
        description: "Model to use for task/judge runs"
        required: false
        default: "mai-code-1-flash-picker"
        type: string

permissions:
  contents: read
  packages: read
  copilot-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SKILL: ${{ inputs.skill }}
      ITERATION: "1"
      MODEL: ${{ inputs.model }}
      SKILL_EVAL_IMAGE: ghcr.io/${{ github.repository }}/skill-eval-agent:latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull agent sandbox image
        run: docker pull "$SKILL_EVAL_IMAGE"

      - name: Run evaluation
        run: |
          python evals/evaluate.py --skill "$SKILL" --model "$MODEL"

      - name: Generate HTML report
        run: python evals/report.py --skill "$SKILL"

      - name: Publish run summary
        run: |
          python - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json, os
          from pathlib import Path

          skill, it = os.environ["SKILL"], os.environ["ITERATION"]
          bench = json.loads(Path(f"{skill}-workspace/iteration-{it}/benchmark.json").read_text())
          rs = bench["run_summary"]

          FMT = {"pass_rate": lambda v: f"{v:.0%}", "tokens": lambda v: f"{v:,.0f}",
                 "time_seconds": lambda v: f"{v:,.1f}"}

          def mean(cfg, key):
              v = (rs.get(cfg, {}).get(key) or {}).get("mean")
              return "—" if v is None else FMT[key](v)

          def delta(key):
              v = rs.get("delta", {}).get(key)
              return "—" if v is None else ("+" if v > 0 else "") + FMT[key](v)

          print(f"# Skill eval: `{skill}`")
          print(f"\nModel pinned: `{bench.get('model_pinned') or '(unpinned)'}` · "
                f"observed: `{', '.join(bench.get('models_observed') or []) or '—'}`\n")
          print("| Metric | With skill | Without | Δ |")
          print("|---|---:|---:|---:|")
          for label, key in (("Pass rate", "pass_rate"), ("Tokens / run", "tokens"),
                             ("Time (s) / run", "time_seconds")):
              print(f"| {label} | {mean('with_skill', key)} | {mean('without_skill', key)} "
                    f"| {delta(key)} |")
          print("\n| Eval | Pass rate (with) | Pass rate (without) | Skill fired |")
          print("|---|---:|---:|---|")
          for e in bench.get("evals", []):
              w, wo = e.get("with_skill") or {}, e.get("without_skill") or {}
              fired = ", ".join(w.get("invoked_skills") or []) or "—"
              def pr(c):
                  v = c.get("pass_rate")
                  return "—" if v is None else f"{v:.0%}"
              print(f"| `{e.get('slug')}` | {pr(w)} | {pr(wo)} | {fired} |")
          print("\nFull results (report.html, transcripts, gradings) are in the run artifact.")
          EOF

      - name: Quality gate
        run: |
          set +e
          python evals/gate.py --skill "$SKILL" | tee gate_out.txt
          GATE_EXIT=${PIPESTATUS[0]}
          {
            echo ""; echo "## Quality gate"; echo '```'; cat gate_out.txt; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$GATE_EXIT"

      - name: Compute artifact name
        if: always()
        run: echo "ARTIFACT_NAME=eval-$(echo "$SKILL" | tr '/' '-')" >> "$GITHUB_ENV"

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ inputs.skill }}-workspace/iteration-1/
          if-no-files-found: warn
          retention-days: 10
