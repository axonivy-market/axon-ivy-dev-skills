name: Evaluate skill

on:
  workflow_dispatch:
    inputs:
      skill:
        description: "Skill path, e.g. configuration/skills/custom-fields-l10n"
        required: true
        type: string
      baseline:
        description: "What to compare the skill against"
        required: false
        default: "previous-version"
        type: choice
        options:
          - previous-version
          - without-skill
      model:
        description: "Model to use for task/judge runs"
        required: false
        default: "mai-code-1-flash-picker"
        type: string

permissions:
  contents: read
  packages: read
  copilot-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SKILL: ${{ inputs.skill }}
      BASELINE: ${{ inputs.baseline }}
      MODEL: ${{ inputs.model }}
      SKILL_EVAL_IMAGE: ghcr.io/${{ github.repository }}/skill-eval-agent:latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull agent sandbox image
        run: docker pull "$SKILL_EVAL_IMAGE"

      # Git resolution (fetch, worktree materialize + cleanup against
      # DEFAULT_BRANCH) lives inside the harness now — see skill_eval/baseline.py.
      # 'previous-version' only degrades to the without-skill baseline for a
      # brand-new skill (no SKILL.md on the default branch yet); any actual git
      # failure raises and fails the run.
      - name: Run evaluation
        run: python evals/evaluate.py --skill "$SKILL" --model "$MODEL" --baseline "$BASELINE"

      - name: Generate HTML report
        run: python evals/report.py --skill "$SKILL"

      - name: Publish run summary
        run: python evals/summary.py --skill "$SKILL" >> "$GITHUB_STEP_SUMMARY"

      - name: Quality gate
        run: |
          set +e
          python evals/gate.py --skill "$SKILL" | tee gate_out.txt
          GATE_EXIT=${PIPESTATUS[0]}
          {
            echo ""; echo "## Quality gate"; echo '```'; cat gate_out.txt; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$GATE_EXIT"

      - name: Compute artifact name
        if: always()
        run: echo "ARTIFACT_NAME=eval-$(echo "$SKILL" | tr '/' '-')" >> "$GITHUB_ENV"

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ inputs.skill }}-workspace/iteration-1/
          if-no-files-found: warn
          retention-days: 10
